<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manga Style Clock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="clock-container">
        <!-- Manga-style speech bubble -->
        <div class="speech-bubble">
            <div class="bubble-text">TIME</div>
        </div>
        
        <!-- Main digital clock display -->
        <div class="digital-clock" id="digital-clock">
            <span class="time-segment hours">00</span>
            <span class="time-separator">:</span>
            <span class="time-segment minutes">00</span>
            <span class="time-separator">:</span>
            <span class="time-segment seconds">00</span>
        </div>
        
        <!-- Manga-style decorative elements -->
        <div class="manga-decoration">
            <div class="star star-1">★</div>
            <div class="star star-2">★</div>
            <div class="star star-3">★</div>
            <div class="sparkle sparkle-1">✦</div>
            <div class="sparkle sparkle-2">✦</div>
            <div class="sparkle sparkle-3">✦</div>
        </div>
        
        <!-- Date display in manga style -->
        <div class="date-display" id="date-display">
            <span class="day-name">MONDAY</span>
            <span class="date-number">01</span>
            <span class="month-name">JANUARY</span>
        </div>
        
        <!-- Am/Pm indicator -->
        <div class="ampm-indicator" id="ampm-indicator">AM</div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
